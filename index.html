<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>samoldsamold</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  <style>
    .material-symbols-outlined {
      font-family: 'Material Symbols Outlined';
      font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
      display: inline-block;
      line-height: 1;
    }

    /* ── Reset ──────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #070b12;
      --glow:    128, 255, 40;
      --text:    #dde8d9;
      --muted:   #3d4b3b;
      --surface: rgba(7, 11, 18, 0.92);
      --border:  rgba(128, 255, 40, 0.28);
    }

    html, body { width: 100%; height: 100%; }

    body {
      background: var(--bg);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', sans-serif;
      color: var(--text);
      overscroll-behavior: none;
      overflow: hidden;
    }

    /* ── Global ambient glow ────────────────────────────────── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      background: radial-gradient(
        ellipse 620px 480px at 50% 48%,
        rgba(var(--glow), 0.055) 0%,
        rgba(var(--glow), 0.018) 45%,
        transparent 72%
      );
    }

    /* ── Stage: the canvas where the cat lives ──────────────── */
    .stage {
      position: relative;
      width: 440px;
      height: 440px;
      flex-shrink: 0;
    }

    /* ── Subtle cat-head SVG outline ────────────────────────── */
    .cat-svg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      overflow: visible;
    }

    /* ── Letter node ─────────────────────────────────────────
       Each <a> is absolutely positioned within .stage.
       Contains a .glyph (visible letter) and a .tip (tooltip).
    ─────────────────────────────────────────────────────────── */
    .lnode {
      position: absolute;
      display: flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      color: inherit;
      outline: none;
      -webkit-tap-highlight-color: transparent;
    }

    .glyph {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      color: rgba(255, 255, 255, 0.78);
      line-height: 1;
      user-select: none;
      transition: color 240ms ease, text-shadow 240ms ease;
    }

    /* O is the cat eye — always glowing green */
    .lnode.eye .glyph {
      color: rgb(var(--glow));
      text-shadow:
        0 0 16px rgba(var(--glow), 0.62),
        0 0 48px rgba(var(--glow), 0.24);
      animation: eye-breathe 3.2s ease-in-out infinite;
    }

    @keyframes eye-breathe {
      0%, 100% {
        text-shadow:
          0 0 16px rgba(var(--glow), 0.62),
          0 0 48px rgba(var(--glow), 0.24);
      }
      50% {
        text-shadow:
          0 0 26px rgba(var(--glow), 0.85),
          0 0 68px rgba(var(--glow), 0.38);
      }
    }

    /* All letters: green on hover / focus */
    .lnode:is(:hover, :focus-visible) .glyph {
      color: rgb(var(--glow));
      text-shadow:
        0 0 18px rgba(var(--glow), 0.58),
        0 0 52px rgba(var(--glow), 0.20);
    }

    /* ── Tooltip card ───────────────────────────────────────── */
    .tip {
      position: absolute;
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 8px 13px 8px 11px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 11px;
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      white-space: nowrap;
      pointer-events: none;
      opacity: 0;
      z-index: 30;
      transition: opacity 180ms ease, translate 180ms ease;
    }

    /* Direction variants — initial (hidden) offset then hover snap */
    .tip-below {
      top: calc(100% + 10px);
      left: 50%;
      translate: -50% 7px;
    }
    .lnode:is(:hover, :focus-visible) .tip-below {
      opacity: 1;
      translate: -50% 0;
    }

    .tip-above {
      bottom: calc(100% + 10px);
      left: 50%;
      translate: -50% -7px;
    }
    .lnode:is(:hover, :focus-visible) .tip-above {
      opacity: 1;
      translate: -50% 0;
    }

    .tip-right {
      left: calc(100% + 10px);
      top: 50%;
      translate: -7px -50%;
    }
    .lnode:is(:hover, :focus-visible) .tip-right {
      opacity: 1;
      translate: 0 -50%;
    }

    .tip-left {
      right: calc(100% + 10px);
      top: 50%;
      translate: 7px -50%;
    }
    .lnode:is(:hover, :focus-visible) .tip-left {
      opacity: 1;
      translate: 0 -50%;
    }

    /* Tooltip internals */
    .tip-ico {
      color: rgb(var(--glow));
      font-size: 17px;
      flex-shrink: 0;
    }

    .tip-body {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .tip-en {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      line-height: 1;
    }

    .tip-cn {
      font-size: 11px;
      color: rgba(var(--glow), 0.5);
      line-height: 1;
    }

    /* ── Footer ─────────────────────────────────────────────── */
    footer {
      position: fixed;
      bottom: max(1.75rem, env(safe-area-inset-bottom));
      left: 0;
      right: 0;
      display: flex;
      justify-content: center;
      pointer-events: none;
    }

    footer span {
      font-size: 10.5px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
    }

    /* ── Mobile scale ───────────────────────────────────────── */
    @media (max-width: 500px) {
      .stage {
        width: 320px;
        height: 320px;
        transform: scale(0.88);
        transform-origin: center center;
      }
    }

    /* ── Touch: show tip on active (tap) ─────────────────────── */
    @media (hover: none) {
      .lnode:active .tip {
        opacity: 1;
      }
    }
  </style>
</head>
<body>

  <div class="stage" role="navigation" aria-label="Site sections">

    <!--
      Cat head SVG outline — very subtle, just shapes the space.
      Coordinate system: 440×440.
      Head ellipse centered at (220, 255), rx:155 ry:158.
      Left ear: peak (122,44). Right ear: peak (318,44).
      M letter at the top naturally echoes the two ear peaks.
    -->
    <svg class="cat-svg" viewBox="0 0 440 440" xmlns="http://www.w3.org/2000/svg">
      <g fill="none" stroke="rgba(255,255,255,0.048)" stroke-width="1.3">
        <!-- Head body -->
        <ellipse cx="220" cy="258" rx="155" ry="158"/>
        <!-- Left ear -->
        <polygon points="76,132 122,44 164,124"/>
        <!-- Right ear -->
        <polygon points="276,124 318,44 364,132"/>
      </g>
      <!-- Eye socket glow ring (behind O letter) -->
      <circle cx="320" cy="158" r="28"
        fill="none"
        stroke="rgba(128,255,40,0.10)"
        stroke-width="1"/>
    </svg>

    <!-- ── M · Moments ── top center, forms the cat ears ─────── -->
    <a class="lnode" href="moments.html" aria-label="Moments"
       style="top:4px; left:136px; width:168px; height:76px;">
      <span class="glyph" style="font-size:4.8rem;">M</span>
      <span class="tip tip-below">
        <span class="tip-ico material-symbols-outlined">photo_camera</span>
        <span class="tip-body">
          <span class="tip-en">Moments</span>
          <span class="tip-cn">瞬间 · 动态</span>
        </span>
      </span>
    </a>

    <!-- ── S · Showcase ── left body ─────────────────────────── -->
    <a class="lnode" href="showcase.html" aria-label="Showcase"
       style="top:124px; left:18px; width:96px; height:108px;">
      <span class="glyph" style="font-size:4.2rem;">S</span>
      <span class="tip tip-right">
        <span class="tip-ico material-symbols-outlined">dashboard</span>
        <span class="tip-body">
          <span class="tip-en">Showcase</span>
          <span class="tip-cn">作品 · 展示</span>
        </span>
      </span>
    </a>

    <!-- ── O · Overview ── right eye, always glowing green ────── -->
    <a class="lnode eye" href="resume.html" aria-label="Overview / Resume"
       style="top:116px; right:24px; width:90px; height:90px;">
      <span class="glyph" style="font-size:4rem;">O</span>
      <span class="tip tip-left">
        <span class="tip-ico material-symbols-outlined">person</span>
        <span class="tip-body">
          <span class="tip-en">Overview</span>
          <span class="tip-cn">关于我 · 简历</span>
        </span>
      </span>
    </a>

    <!-- ── A · Articles ── center face ───────────────────────── -->
    <a class="lnode" href="articles.html" aria-label="Articles"
       style="top:258px; left:172px; width:96px; height:94px;">
      <span class="glyph" style="font-size:4.4rem;">A</span>
      <span class="tip tip-above">
        <span class="tip-ico material-symbols-outlined">edit_note</span>
        <span class="tip-body">
          <span class="tip-en">Articles</span>
          <span class="tip-cn">文章 · 思考</span>
        </span>
      </span>
    </a>

    <!-- ── L · Labs ── lower left ────────────────────────────── -->
    <a class="lnode" href="labs.html" aria-label="Labs"
       style="bottom:38px; left:64px; width:84px; height:86px;">
      <span class="glyph" style="font-size:4rem;">L</span>
      <span class="tip tip-right">
        <span class="tip-ico material-symbols-outlined">biotech</span>
        <span class="tip-body">
          <span class="tip-en">Labs</span>
          <span class="tip-cn">实验室</span>
        </span>
      </span>
    </a>

    <!-- ── D · Discoveries ── lower right ────────────────────── -->
    <a class="lnode" href="discoveries.html" aria-label="Discoveries"
       style="bottom:38px; right:56px; width:84px; height:86px;">
      <span class="glyph" style="font-size:4rem;">D</span>
      <span class="tip tip-left">
        <span class="tip-ico material-symbols-outlined">explore</span>
        <span class="tip-body">
          <span class="tip-en">Discoveries</span>
          <span class="tip-cn">发现 · 收藏</span>
        </span>
      </span>
    </a>

  </div>

  <footer>
    <span>samoldsamold</span>
  </footer>

</body>
</html>
